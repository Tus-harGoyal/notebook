<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Notebook">
<meta name="theme-color" content="#faf7f2">
<link rel="manifest" href="manifest.json">
<title>Pocket Notebook</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f3;
    --soft-sage: #c8d5b9;
    --sage-mid: #a8bf94;
    --done-green: #d4edda;
    --done-green-border: #a3c9a8;
    --done-green-text: #3a7a4a;
    --soft-sand: #e8dcc8;
    --muted-text: #8a7f72;
    --main-text: #3d3530;
    --soft-red: #f5e0dc;
    --border: #e0d6c8;
    --accent: #b5987a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--main-text); min-height: 100vh; min-height: -webkit-fill-available; }
  .view { display: none; }
  .view.active { display: block; }

  header {
    background: var(--warm-white); border-bottom: 1px solid var(--border);
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .date-block h1 { font-family: 'Lora', serif; font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; }
  .date-block span { font-size: 0.78rem; color: var(--muted-text); display: block; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--warm-white); color: var(--main-text); cursor: pointer;
    transition: all 0.15s ease; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn:hover { background: var(--soft-sand); border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #a07f60; }
  .btn.icon-btn { padding: 7px 11px; font-size: 1rem; }

  main { max-width: 560px; margin: 0 auto; padding: 28px 18px 100px; }
  .section-label { font-family: 'Lora', serif; font-style: italic; font-size: 0.85rem; color: var(--muted-text); margin-bottom: 14px; }

  /* TASK ITEM */
  .task-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }

  .task-block { display: flex; flex-direction: column; }

  .task-item {
    background: var(--warm-white); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 14px; display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; cursor: pointer; transition: all 0.2s ease; user-select: none;
  }
  .task-item:active { transform: scale(0.99); }
  .task-item.done { background: var(--done-green); border-color: var(--done-green-border); }
  .task-item.done .task-text { color: var(--done-green-text); text-decoration: line-through; text-decoration-color: var(--done-green-border); }
  .task-item.has-stack { border-radius: 10px 10px 4px 4px; }

  .task-text { font-size: 0.9rem; line-height: 1.5; flex: 1; }
  .task-meta { font-size: 0.72rem; color: var(--muted-text); margin-top: 3px; }

  /* STACK SUB-ITEMS */
  .stack-children { display: flex; flex-direction: column; gap: 2px; }

  .stack-child {
    background: #f0f5f9;
    border: 1px solid #c8dcea;
    border-top: none;
    border-radius: 0;
    padding: 9px 14px 9px 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; cursor: pointer; transition: all 0.2s ease; user-select: none;
  }
  .stack-child:last-child { border-radius: 0 0 10px 10px; }
  .stack-child.done { background: #e8f5ea; border-color: #b8dfc0; }
  .stack-child.done .stack-child-text { color: var(--done-green-text); text-decoration: line-through; text-decoration-color: #9dca9d; }
  .stack-child-text { font-size: 0.85rem; line-height: 1.4; color: #3a5a72; flex: 1; }
  .stack-child-text::before { content: 'also '; font-style: italic; color: #8aabbf; }
  .stack-child.done .stack-child-text::before { color: #9dca9d; }

  .bin-btn {
    background: none; border: none; cursor: pointer; padding: 4px 6px;
    border-radius: 6px; color: var(--muted-text); font-size: 0.85rem;
    transition: all 0.15s; flex-shrink: 0; opacity: 0.4;
  }
  .bin-btn:active { background: var(--soft-red); color: #c0504d; opacity: 1; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted-text);
    font-family: 'Lora', serif; font-style: italic; font-size: 0.92rem;
    background: var(--warm-white); border: 1px dashed var(--border); border-radius: 12px;
  }

  .bottom-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(60,45,30,0.28); backdrop-filter: blur(4px);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--warm-white); border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px; width: 100%; max-width: 560px;
    box-shadow: 0 -8px 40px rgba(80,60,40,0.15);
    animation: slideUp 0.22s ease; max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal h2 { font-family: 'Lora', serif; font-size: 1.05rem; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--muted-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    color: var(--main-text); outline: none; transition: border 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .time-hint { font-size: 0.72rem; color: var(--muted-text); margin-top: 5px; }
  .time-detected { font-size: 0.78rem; color: #3a7a4a; margin-top: 5px; font-weight: 500; }

  .preview-text {
    background: var(--soft-sage); border-radius: 10px; padding: 12px 14px;
    font-size: 0.88rem; color: #3a5a2a; font-style: italic; margin-bottom: 16px;
    min-height: 46px; line-height: 1.5;
  }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

  /* STACK PICKER */
  .stack-section-label { font-size: 0.75rem; font-weight: 500; color: var(--muted-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stack-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-height: 180px; overflow-y: auto; }
  .stack-option {
    padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--cream); cursor: pointer; font-size: 0.88rem; line-height: 1.4;
    transition: all 0.15s; color: var(--main-text);
  }
  .stack-option:active { transform: scale(0.98); }
  .stack-option.selected { background: #ddeaf5; border-color: #a8c4dc; color: #2a5a7a; font-weight: 500; }

  /* CALENDAR */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .cal-header h2 { font-family: 'Lora', serif; font-size: 1.1rem; }
  .cal-nav { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 1rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 22px; }
  .cal-day-name { text-align: center; font-size: 0.7rem; font-weight: 500; color: var(--muted-text); text-transform: uppercase; letter-spacing: 0.4px; padding: 4px 0; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
    position: relative; border: 1px solid transparent;
  }
  .cal-cell:active { background: var(--soft-sand); }
  .cal-cell.today { background: var(--soft-sage); font-weight: 600; border-color: var(--sage-mid); }
  .cal-cell.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cal-cell.has-tasks::after {
    content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
  }
  .cal-cell.selected.has-tasks::after { background: rgba(255,255,255,0.7); }
  .cal-cell.other-month { color: var(--muted-text); opacity: 0.35; }
  .cal-day-tasks h3 { font-family: 'Lora', serif; font-size: 0.92rem; margin-bottom: 12px; color: var(--muted-text); font-style: italic; }

  .backup-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #3d3530; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 0.85rem; opacity: 0; transition: all 0.3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TODAY VIEW -->
<div id="todayView" class="view active">
  <header>
    <div class="date-block">
      <h1 id="todayDate">—</h1>
      <span id="todayClock">—</span>
    </div>
    <div class="header-actions">
      <button class="btn icon-btn" onclick="showCalendar()" title="Calendar">📅</button>
      <button class="btn icon-btn" onclick="toggleSettings()" title="Settings">⚙️</button>
    </div>
  </header>

  <div id="settingsDrawer" style="display:none; background:#fff9f3; border-bottom:1px solid var(--border); padding:16px 20px;">
    <div style="max-width:560px; margin:0 auto;">
      <p style="font-family:'Lora',serif; font-style:italic; font-size:0.82rem; color:var(--muted-text); margin-bottom:12px;">backup & restore — only needed if you switch phones</p>
      <div class="backup-row">
        <button class="btn" onclick="exportData()">⬇ Export backup</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">⬆ Import backup</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
  </div>

  <main>
    <p class="section-label">today's intentions</p>
    <div class="task-list" id="taskList"></div>
    <div class="bottom-actions">
      <button class="btn primary" onclick="openAddModal(null)">+ Add activity</button>
      <button class="btn" onclick="openStackModal(null)">⊕ Stack</button>
      <button class="btn" onclick="repeatTomorrow()">↻ Repeat tomorrow</button>
    </div>
  </main>
</div>

<!-- CALENDAR VIEW -->
<div id="calendarView" class="view">
  <header>
    <div class="date-block">
      <h1 style="font-family:'Lora',serif;">Calendar</h1>
      <span>plan ahead</span>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="showToday()">← Today</button>
    </div>
  </header>
  <main>
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <h2 id="calMonthLabel"></h2>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-day-tasks">
      <h3 id="calSelectedLabel">Select a day</h3>
      <div class="task-list" id="calTaskList"></div>
      <div id="calAddBtnWrap"></div>
    </div>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal" onclick="handleOverlayClick(event,'addModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>New activity</h2>
    <div class="field">
      <label>Activity / behaviour</label>
      <input type="text" id="inp_activity" placeholder="e.g. boil and drink hot water" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>Time <span style="font-size:0.7rem;color:var(--muted-text);text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label>
      <input type="text" id="inp_time" placeholder="e.g. 8am, 8:30 am, 9pm…" oninput="onTimeInput()">
      <div class="time-hint" id="timeHint">Type freely — 8am, 8:30am, 9:00, 21:00 all work</div>
      <div class="time-detected" id="timeDetected" style="display:none"></div>
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="inp_location" placeholder="e.g. on the study table" oninput="updatePreview()">
    </div>
    <div class="preview-text" id="addPreview">Your intention will appear here…</div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn primary" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<!-- STACK MODAL -->
<div class="modal-overlay" id="stackModal" onclick="handleOverlayClick(event,'stackModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Stack an activity</h2>
    <div class="field">
      <label>New activity / behaviour</label>
      <input type="text" id="stk_activity" placeholder="e.g. drink a glass of water" oninput="updateStackPreview()">
    </div>
    <div class="field">
      <label>Location <span style="font-size:0.7rem;color:var(--muted-text);text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label>
      <input type="text" id="stk_location" placeholder="e.g. in the kitchen" oninput="updateStackPreview()">
    </div>
    <p class="stack-section-label" style="margin-top:2px;">Stack onto which activity?</p>
    <div class="stack-list" id="stackPickerList"></div>
    <div class="preview-text" id="stackPreview">Preview will appear here…</div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('stackModal')">Cancel</button>
      <button class="btn primary" onclick="confirmStack()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STORAGE =====
let tasks = {};
let DB = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('PocketNotebook', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('data', { keyPath: 'id' });
    req.onsuccess = e => { DB = e.target.result; resolve(DB); };
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(key) {
  return new Promise(resolve => {
    const tx = DB.transaction('data','readonly');
    const req = tx.objectStore('data').get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = () => resolve(null);
  });
}
async function dbSet(key, value) {
  return new Promise(resolve => {
    const tx = DB.transaction('data','readwrite');
    tx.objectStore('data').put({ id: key, value });
    tx.oncomplete = resolve; tx.onerror = resolve;
  });
}
async function loadTasks() {
  try { await openDB(); const d = await dbGet('tasks'); if (d) { tasks = d; return; } } catch(e) {}
  try { tasks = JSON.parse(localStorage.getItem('pn_tasks') || '{}'); } catch(e) { tasks = {}; }
}
async function save() {
  try { if (DB) await dbSet('tasks', tasks); } catch(e) {}
  try { localStorage.setItem('pn_tasks', JSON.stringify(tasks)); } catch(e) {}
}

// ===== HELPERS =====
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getOrCreate(key) { if (!tasks[key]) tasks[key] = []; return tasks[key]; }
function uid() { return Date.now().toString() + Math.floor(Math.random()*9999); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== SMART TIME PARSER =====
// Returns { h, m } (24h) or null
function parseSmartTime(raw) {
  if (!raw) return null;
  const s = raw.trim().toLowerCase().replace(/\s+/g, '');

  // Patterns to try
  const patterns = [
    // 8am, 8pm, 8AM
    { re: /^(\d{1,2})(am|pm)$/, fn: m => ({ h: toH(+m[1], m[2]), m: 0 }) },
    // 8:30am, 8:30pm
    { re: /^(\d{1,2}):(\d{2})(am|pm)$/, fn: m => ({ h: toH(+m[1], m[3]), m: +m[2] }) },
    // 8.30am
    { re: /^(\d{1,2})\.(\d{2})(am|pm)$/, fn: m => ({ h: toH(+m[1], m[3]), m: +m[2] }) },
    // 8:30 (no am/pm — treat < 7 as pm, else am)
    { re: /^(\d{1,2}):(\d{2})$/, fn: m => ({ h: guessAmPm(+m[1]), m: +m[2] }) },
    // 8.30
    { re: /^(\d{1,2})\.(\d{2})$/, fn: m => ({ h: guessAmPm(+m[1]), m: +m[2] }) },
    // 21:00 or 0800
    { re: /^(\d{2})(\d{2})$/, fn: m => ({ h: +m[1], m: +m[2] }) },
    // plain hour: 8, 9, 21
    { re: /^(\d{1,2})$/, fn: m => ({ h: guessAmPm(+m[1]), m: 0 }) },
  ];

  // also handle spaced version like "8 am"
  const sWithSpace = raw.trim().toLowerCase();
  const spacedAm = sWithSpace.match(/^(\d{1,2})\s*(am|pm)$/);
  if (spacedAm) return { h: toH(+spacedAm[1], spacedAm[2]), m: 0 };
  const spacedAmMin = sWithSpace.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);
  if (spacedAmMin) return { h: toH(+spacedAmMin[1], spacedAmMin[3]), m: +spacedAmMin[2] };
  const spacedAmMin2 = sWithSpace.match(/^(\d{1,2})\.(\d{2})\s*(am|pm)$/);
  if (spacedAmMin2) return { h: toH(+spacedAmMin2[1], spacedAmMin2[3]), m: +spacedAmMin2[2] };

  for (const { re, fn } of patterns) {
    const m = s.match(re);
    if (m) {
      const result = fn(m);
      if (result.h >= 0 && result.h <= 23 && result.m >= 0 && result.m <= 59) return result;
    }
  }
  return null;
}

function toH(h, ampm) {
  if (ampm === 'am') return h === 12 ? 0 : h;
  if (ampm === 'pm') return h === 12 ? 12 : h + 12;
  return h;
}

function guessAmPm(h) {
  // If 1-6, assume pm (1pm-6pm more common). 7-11 assume am. 12-23 as-is
  if (h >= 0 && h <= 6) return h + 12;
  return h;
}

function timeToDisplay(parsed) {
  if (!parsed) return '';
  const { h, m } = parsed;
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function timeToHHMM(parsed) {
  if (!parsed) return null;
  return `${String(parsed.h).padStart(2,'0')}:${String(parsed.m).padStart(2,'0')}`;
}

// ===== NOTIFICATIONS =====
let notifTimers = [];

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  return (await Notification.requestPermission()) === 'granted';
}

function scheduleNotification(text, hhmmStr) {
  if (!hhmmStr) return;
  const [h, m] = hhmmStr.split(':').map(Number);
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  const delay = target - now;
  if (delay <= 0) return;
  const timer = setTimeout(async () => {
    if (await requestNotifPermission()) {
      new Notification('Pocket Notebook 📓', { body: text, icon: 'icon.svg' });
    }
  }, delay);
  notifTimers.push(timer);
}

function rescheduleAllNotifications() {
  notifTimers.forEach(clearTimeout); notifTimers = [];
  (tasks[todayKey()] || []).forEach(t => {
    if (t.notifTime && !t.done) scheduleNotification(t.text, t.notifTime);
  });
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('todayDate').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  let h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  document.getElementById('todayClock').textContent = `${h}:${m} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

// ===== RENDER =====
function renderList(containerEl, key) {
  const list = getOrCreate(key);
  containerEl.innerHTML = '';

  if (!list.length) {
    containerEl.innerHTML = '<div class="empty-state">Nothing planned yet.<br>Add your first intention below.</div>';
    return;
  }

  // Build parent tasks (non-stacked) with their stacked children
  const parents = list.filter(t => !t.stackedOnto);
  const orphans = list.filter(t => t.stackedOnto && !list.find(p => p.id === t.stackedOnto));

  [...parents, ...orphans].forEach(parent => {
    const children = list.filter(t => t.stackedOnto === parent.id);
    const block = document.createElement('div');
    block.className = 'task-block';

    // Parent item
    const hasChildren = children.length > 0;
    const div = document.createElement('div');
    div.className = 'task-item' + (parent.done ? ' done' : '') + (hasChildren ? ' has-stack' : '');
    const meta = parent.notifTime
      ? `<div class="task-meta">🔔 ${parent.notifTime}</div>`
      : '';
    div.innerHTML = `<div style="flex:1"><span class="task-text">${parent.text}</span>${meta}</div><button class="bin-btn" onclick="removeTask('${key}','${parent.id}',event)">🗑</button>`;
    div.addEventListener('click', e => { if (!e.target.classList.contains('bin-btn')) toggleTask(key, parent.id); });
    block.appendChild(div);

    // Stack children
    if (hasChildren) {
      const childWrap = document.createElement('div');
      childWrap.className = 'stack-children';
      children.forEach(child => {
        const cdiv = document.createElement('div');
        cdiv.className = 'stack-child' + (child.done ? ' done' : '');
        cdiv.innerHTML = `<span class="stack-child-text">${child.text}</span><button class="bin-btn" onclick="removeTask('${key}','${child.id}',event)">🗑</button>`;
        cdiv.addEventListener('click', e => { if (!e.target.classList.contains('bin-btn')) toggleTask(key, child.id); });
        childWrap.appendChild(cdiv);
      });
      block.appendChild(childWrap);
    }

    containerEl.appendChild(block);
  });
}

function renderToday() {
  renderList(document.getElementById('taskList'), todayKey());
}

function toggleTask(key, id) {
  const t = (tasks[key] || []).find(x => x.id === id);
  if (!t) return;
  t.done = !t.done; save();
  if (key === todayKey()) renderToday(); else renderCalTasks();
}

function removeTask(key, id, e) {
  e.stopPropagation();
  // Also remove any children stacked onto this task
  tasks[key] = (tasks[key] || []).filter(x => x.id !== id && x.stackedOnto !== id);
  save();
  if (key === todayKey()) renderToday(); else renderCalTasks();
  if (typeof calSelectedDate !== 'undefined') renderCalGrid();
}

// ===== SETTINGS =====
function toggleSettings() {
  const d = document.getElementById('settingsDrawer');
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

// ===== MODALS =====
let addingForDate = null;
let stackingForDate = null;
let selectedStackId = null;
let parsedTime = null; // currently parsed time in add modal

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleOverlayClick(e, id) { if (e.target === e.currentTarget) closeModal(id); }

// -- ADD --
function openAddModal(forDate) {
  addingForDate = forDate;
  parsedTime = null;
  document.getElementById('inp_activity').value = '';
  document.getElementById('inp_time').value = '';
  document.getElementById('inp_location').value = '';
  document.getElementById('addPreview').textContent = 'Your intention will appear here…';
  document.getElementById('timeHint').style.display = 'block';
  document.getElementById('timeDetected').style.display = 'none';
  document.getElementById('addModal').classList.add('open');
  requestNotifPermission();
  setTimeout(() => document.getElementById('inp_activity').focus(), 300);
}

function onTimeInput() {
  const raw = document.getElementById('inp_time').value;
  const hint = document.getElementById('timeHint');
  const detected = document.getElementById('timeDetected');
  parsedTime = parseSmartTime(raw);
  if (raw.trim() === '') {
    hint.style.display = 'block';
    detected.style.display = 'none';
  } else if (parsedTime) {
    hint.style.display = 'none';
    detected.style.display = 'block';
    detected.textContent = '✓ Detected: ' + timeToDisplay(parsedTime);
  } else {
    hint.style.display = 'none';
    detected.style.display = 'block';
    detected.style.color = '#b05040';
    detected.textContent = 'Hmm, couldn\'t read that time';
  }
  if (parsedTime) detected.style.color = '#3a7a4a';
  updatePreview();
}

function buildSentence(a, parsedT, l) {
  if (!a) return '';
  let parts = ['I will', a];
  if (parsedT) parts.push('at ' + timeToDisplay(parsedT));
  if (l) parts.push(l.match(/^(on|at|in|by)\s/i) ? l : 'at ' + l);
  return parts.join(' ') + '.';
}

function updatePreview() {
  const s = buildSentence(
    document.getElementById('inp_activity').value.trim(),
    parsedTime,
    document.getElementById('inp_location').value.trim()
  );
  document.getElementById('addPreview').textContent = s || 'Your intention will appear here…';
}

function confirmAdd() {
  const a = document.getElementById('inp_activity').value.trim();
  const l = document.getElementById('inp_location').value.trim();
  if (!a) { document.getElementById('inp_activity').focus(); return; }
  const text = buildSentence(a, parsedTime, l);
  const key = addingForDate || todayKey();
  const task = { id: uid(), text, done: false };
  if (parsedTime) {
    task.notifTime = timeToDisplay(parsedTime); // display string e.g. "8:00 am"
    task.notifHHMM = timeToHHMM(parsedTime);   // "HH:MM" for scheduling
  }
  getOrCreate(key).push(task);
  save();
  if (parsedTime && key === todayKey()) scheduleNotification(text, task.notifHHMM);
  closeModal('addModal');
  if (key === todayKey()) renderToday(); else { renderCalTasks(); renderCalGrid(); }
  showToast('Activity added ✓');
}

// -- STACK --
function openStackModal(forDate) {
  stackingForDate = forDate;
  selectedStackId = null;
  document.getElementById('stk_activity').value = '';
  document.getElementById('stk_location').value = '';
  document.getElementById('stackPreview').textContent = 'Preview will appear here…';

  const key = forDate || todayKey();
  // Only show non-stacked (parent) tasks
  const parents = (tasks[key] || []).filter(t => !t.stackedOnto);
  const picker = document.getElementById('stackPickerList');
  picker.innerHTML = '';

  if (!parents.length) {
    picker.innerHTML = '<div style="font-size:0.85rem;color:var(--muted-text);font-style:italic;padding:6px 2px;">Add at least one activity first, then stack onto it.</div>';
  } else {
    parents.forEach(task => {
      const div = document.createElement('div');
      div.className = 'stack-option';
      div.textContent = task.text;
      div.onclick = () => {
        document.querySelectorAll('.stack-option').forEach(o => o.classList.remove('selected'));
        div.classList.add('selected');
        selectedStackId = task.id;
        updateStackPreview();
      };
      picker.appendChild(div);
    });
  }

  document.getElementById('stackModal').classList.add('open');
  setTimeout(() => document.getElementById('stk_activity').focus(), 300);
}

function updateStackPreview() {
  const a = document.getElementById('stk_activity').value.trim();
  const l = document.getElementById('stk_location').value.trim();
  if (!a) { document.getElementById('stackPreview').textContent = 'Preview will appear here…'; return; }
  const loc = l ? (l.match(/^(on|at|in|by)\s/i) ? l : 'in ' + l) : '';
  document.getElementById('stackPreview').textContent = `also ${a}${loc ? ' ' + loc : ''}.`;
}

function confirmStack() {
  const a = document.getElementById('stk_activity').value.trim();
  const l = document.getElementById('stk_location').value.trim();
  if (!a) { document.getElementById('stk_activity').focus(); return; }
  if (!selectedStackId) { showToast('Please select an activity to stack onto'); return; }
  const loc = l ? (l.match(/^(on|at|in|by)\s/i) ? l : 'in ' + l) : '';
  const text = `${a}${loc ? ' ' + loc : ''}`;
  const key = stackingForDate || todayKey();
  getOrCreate(key).push({ id: uid(), text, done: false, stackedOnto: selectedStackId });
  save();
  closeModal('stackModal');
  if (key === todayKey()) renderToday(); else { renderCalTasks(); renderCalGrid(); }
  showToast('Stacked ✓');
}

// ===== REPEAT TOMORROW =====
function repeatTomorrow() {
  const key = todayKey();
  const list = getOrCreate(key);
  if (!list.length) { showToast('Nothing to repeat'); return; }
  const d = new Date(); d.setDate(d.getDate() + 1);
  const tmKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const existing = getOrCreate(tmKey);
  // Map old IDs to new IDs for stacking relationships
  const idMap = {};
  list.forEach(t => {
    if (!existing.find(e => e.text === t.text)) {
      const newId = uid();
      idMap[t.id] = newId;
      existing.push({ id: newId, text: t.text, done: false,
        stackedOnto: t.stackedOnto ? null : undefined // resolve below
      });
    }
  });
  // Resolve stackedOnto with new IDs
  existing.forEach(t => {
    const orig = list.find(o => o.text === t.text);
    if (orig && orig.stackedOnto && idMap[orig.stackedOnto]) {
      t.stackedOnto = idMap[orig.stackedOnto];
    }
  });
  save();
  showToast('Repeated to tomorrow ✓');
}

// ===== CALENDAR =====
let calYear, calMonth, calSelectedDate;

function showCalendar() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  calSelectedDate = todayKey();
  document.getElementById('todayView').classList.remove('active');
  document.getElementById('calendarView').classList.add('active');
  renderCalGrid(); renderCalTasks();
}

function showToday() {
  document.getElementById('calendarView').classList.remove('active');
  document.getElementById('todayView').classList.add('active');
  renderToday();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalGrid();
}

function renderCalGrid() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = `${months[calMonth]} ${calYear}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const todayStr = todayKey();
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell other-month';
    el.textContent = prevDays - first + 1 + i; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'cal-cell'; el.textContent = d;
    if (key === todayStr) el.classList.add('today');
    if (key === calSelectedDate) el.classList.add('selected');
    if (tasks[key] && tasks[key].length) el.classList.add('has-tasks');
    el.onclick = () => { calSelectedDate = key; renderCalGrid(); renderCalTasks(); };
    grid.appendChild(el);
  }
}

function renderCalTasks() {
  if (!calSelectedDate) return;
  const [y,m,d] = calSelectedDate.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isToday = calSelectedDate === todayKey();
  document.getElementById('calSelectedLabel').textContent =
    isToday ? `Today — ${d} ${months[m-1]}` : `${d} ${months[m-1]} ${y}`;
  renderList(document.getElementById('calTaskList'), calSelectedDate);
  document.getElementById('calAddBtnWrap').innerHTML =
    `<div class="bottom-actions" style="margin-top:14px;">
      <button class="btn primary" onclick="openAddModal('${calSelectedDate}')">+ Add activity</button>
      <button class="btn" onclick="openStackModal('${calSelectedDate}')">⊕ Stack</button>
    </div>`;
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `notebook-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup downloaded ✓');
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      tasks = { ...tasks, ...JSON.parse(e.target.result) };
      await save(); renderToday();
      showToast('Backup restored ✓');
    } catch(err) { showToast('Could not read backup file'); }
  };
  reader.readAsText(file); event.target.value = '';
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

// ===== INIT =====
loadTasks().then(() => { renderToday(); rescheduleAllNotifications(); });
</script>
